<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>돈내놔!!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0E0F14;
      --surface: #16181F;
      --surface2: #1E2028;
      --border: rgba(255,255,255,0.07);
      --text: #F0F1F5;
      --text2: #8A8FA8;
      --text3: #555970;
      --blue: #4F8EF7;
      --blue-dim: rgba(79,142,247,0.12);
      --green: #34D17A;
      --green-dim: rgba(52,209,122,0.12);
      --red: #FF5F6D;
      --red-dim: rgba(255,95,109,0.12);
      --yellow: #FFCA45;
      --radius: 18px;
      --radius-sm: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ─── Layout ─── */
    .app { max-width: 420px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

    /* ─── Header ─── */
    header {
      padding: 28px 24px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky; top: 0; z-index: 10;
    }
    header h1 {
      font-size: 22px; font-weight: 800; letter-spacing: -0.5px;
      background: linear-gradient(90deg, #fff 0%, var(--blue) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    header p { font-size: 13px; color: var(--text3); margin-top: 3px; }

    /* ─── Main ─── */
    main { padding: 20px; display: flex; flex-direction: column; gap: 16px; flex: 1; }

    /* ─── Summary ─── */
    .summary {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    }
    .summary-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px;
    }
    .summary-card .label { font-size: 11px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
    .summary-card .val { font-size: 22px; font-weight: 800; margin-top: 4px; letter-spacing: -0.5px; }
    .summary-card.green .label { color: var(--green); }
    .summary-card.green .val { color: var(--green); }
    .summary-card.red .label { color: var(--red); }
    .summary-card.red .val { color: var(--red); }

    /* ─── Section ─── */
    .section {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
    }
    .section-header {
      padding: 16px 20px;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; user-select: none;
    }
    .section-header h3 { font-size: 14px; font-weight: 700; color: var(--text2); }
    .section-header .chevron { font-size: 10px; color: var(--text3); transition: transform .2s; }
    .section-header.open .chevron { transform: rotate(180deg); }
    .section-body { padding: 0 20px 20px; display: flex; flex-direction: column; gap: 10px; }
    .section-body.collapsed { display: none; }

    /* ─── Inputs ─── */
    .input-group { display: flex; flex-direction: column; gap: 8px; }
    input, textarea {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: var(--radius-sm);
      padding: 13px 14px; font-size: 15px; font-family: inherit;
      width: 100%; transition: border-color .15s, box-shadow .15s;
    }
    input:focus, textarea:focus {
      outline: none; border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(79,142,247,0.15);
    }
    input::placeholder, textarea::placeholder { color: var(--text3); }
    textarea { resize: none; line-height: 1.5; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1) opacity(.3); }

    /* ─── Buttons ─── */
    .btn {
      border: none; cursor: pointer; font-family: inherit;
      font-weight: 700; font-size: 15px; border-radius: var(--radius-sm);
      padding: 14px 16px; transition: all .15s; width: 100%;
    }
    .btn-blue { background: var(--blue); color: #fff; }
    .btn-blue:hover { filter: brightness(1.1); }
    .btn-blue:active { transform: scale(0.98); }
    .btn-ghost {
      background: var(--surface2); color: var(--text2);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: #2a2d38; color: var(--text); }
    .btn-green { background: var(--green); color: #0E1A12; }
    .btn-green:hover { filter: brightness(1.1); }
    .btn-sm {
      font-size: 13px; padding: 10px 14px; font-weight: 600;
    }
    .btn-row { display: flex; gap: 8px; }

    /* ─── Tabs ─── */
    .tabs {
      background: var(--surface2); border-radius: var(--radius-sm);
      display: flex; padding: 4px; gap: 4px;
    }
    .tab {
      flex: 1; padding: 10px; border-radius: 9px; text-align: center;
      font-size: 13px; font-weight: 700; color: var(--text3);
      cursor: pointer; transition: all .2s;
    }
    .tab.active { background: var(--surface); color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }

    /* ─── Request Cards ─── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px;
      animation: fadeUp .25s ease-out;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-date { font-size: 11px; color: var(--text3); font-weight: 600; margin-bottom: 6px; }
    .card-memo { font-size: 13px; color: var(--text2); line-height: 1.5; margin-bottom: 8px; }
    .card-amount { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 12px; }
    .card-amount.pending { color: var(--text); }
    .card-amount.paid { color: var(--green); }
    .card-paid-note { font-size: 12px; color: var(--green); margin-bottom: 12px; }
    .card-status {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 700; padding: 4px 8px;
      border-radius: 6px; margin-bottom: 12px;
    }
    .status-pending { background: var(--red-dim); color: var(--red); }
    .status-paid { background: var(--green-dim); color: var(--green); }

    .card-actions { display: flex; gap: 8px; }
    .delete-btn {
      background: none; border: none; cursor: pointer;
      font-size: 12px; color: var(--text3); padding: 6px 0 0;
      font-family: inherit; text-align: center; width: 100%;
      transition: color .15s;
    }
    .delete-btn:hover { color: var(--red); }

    /* ─── Empty States ─── */
    .empty {
      text-align: center; padding: 40px 20px;
      color: var(--text3); font-size: 14px; line-height: 1.7;
    }
    .empty-icon { font-size: 40px; margin-bottom: 10px; }

    /* ─── Toast ─── */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: #2a2d38; color: var(--text);
      padding: 12px 20px; border-radius: 100px;
      font-size: 14px; font-weight: 600;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      z-index: 9999; white-space: nowrap;
      border: 1px solid var(--border);
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s;
      opacity: 0;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ─── Modal ─── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 9000; padding: 20px; padding-bottom: env(safe-area-inset-bottom, 20px);
      animation: fadein .2s;
    }
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 28px; padding: 28px 24px;
      width: 100%; max-width: 400px;
      animation: slideUp .3s cubic-bezier(.34,1.3,.64,1);
    }
    @keyframes slideUp {
      from { transform: translateY(80px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }
    .modal-title { text-align: center; margin-bottom: 20px; }
    .modal-title .amount { font-size: 36px; font-weight: 900; letter-spacing: -1px; }
    .modal-title .memo { color: var(--text2); font-size: 14px; margin-top: 4px; }
    .modal-title .date { color: var(--text3); font-size: 12px; margin-top: 2px; }
    .acct-box {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 14px; margin-bottom: 16px;
    }
    .acct-box .lbl { font-size: 11px; color: var(--text3); font-weight: 700; margin-bottom: 4px; text-transform: uppercase; }
    .acct-box .val { font-size: 15px; font-weight: 700; }
    .modal-actions { display: flex; flex-direction: column; gap: 8px; }

    /* ─── Divider ─── */
    .divider { height: 1px; background: var(--border); margin: 4px 0; }

    /* ─── Util ─── */
    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <h1>💸 송금 요청</h1>
    <p>친구들에게 돈을 요청하세요</p>
  </header>

  <!-- Main -->
  <main>

    <!-- Summary -->
    <div class="summary">
      <div class="summary-card green">
        <div class="label">받은 돈</div>
        <div class="val" id="totalReceived">0원</div>
      </div>
      <div class="summary-card red">
        <div class="label">못 받은 돈</div>
        <div class="val" id="totalUnreceived">0원</div>
      </div>
    </div>

    <!-- Account Setting -->
    <div class="section" id="accountSection">
      <div class="section-header" onclick="toggleSection('accountBody', this)">
        <h3>🏦 내 계좌 설정</h3>
        <span class="chevron">▼</span>
      </div>
      <div class="section-body" id="accountBody">
        <div class="input-group">
          <input type="text" id="bankName" placeholder="은행 이름 (예: 신한은행)">
          <input type="text" id="accountNumber" placeholder="계좌번호 (예: 110-123-456789)">
          <button class="btn btn-blue" onclick="saveAccount()">저장하기</button>
        </div>
      </div>
    </div>

    <!-- Create Request -->
    <div class="section">
      <div class="section-header open" onclick="toggleSection('createBody', this)">
        <h3>➕ 새 요청 만들기</h3>
        <span class="chevron">▼</span>
      </div>
      <div class="section-body" id="createBody">
        <div class="input-group">
          <input type="number" id="amount" placeholder="금액 (예: 10000)">
          <input type="date" id="date">
          <textarea id="memo" rows="2" placeholder="메모 (예: 12월 치맥 비용)"></textarea>
          <button class="btn btn-blue" onclick="createRequest()">요청 만들기</button>
        </div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" id="tab-unreceived" onclick="switchTab('unreceived')">
        미수령 (<span id="unreceivedCount">0</span>)
      </div>
      <div class="tab" id="tab-received" onclick="switchTab('received')">
        수령완료 (<span id="receivedCount">0</span>)
      </div>
    </div>

    <!-- Lists -->
    <div id="unreceivedList"></div>
    <div id="receivedList" class="hidden"></div>

  </main>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────
let requests = [];
let account  = {};
const LS_REQ = 'mr_requests';
const LS_ACC = 'mr_account';

try { requests = JSON.parse(localStorage.getItem(LS_REQ) || '[]'); } catch(e){}
try { account  = JSON.parse(localStorage.getItem(LS_ACC) || '{}'); } catch(e){}

// ── Init ───────────────────────────────────────────────
function init() {
  if (account.bank)      document.getElementById('bankName').value = account.bank;
  if (account.accountNo) document.getElementById('accountNumber').value = account.accountNo;

  // 계좌가 이미 있으면 섹션 접기
  if (account.bank && account.accountNo) {
    const body = document.getElementById('accountBody');
    const hdr  = body.previousElementSibling;
    body.classList.add('collapsed');
    hdr.classList.remove('open');
  }

  renderRequests();
  checkShareLink();
}

// ── Toast ──────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ── Section Toggle ─────────────────────────────────────
function toggleSection(bodyId, header) {
  const body = document.getElementById(bodyId);
  const isOpen = !body.classList.contains('collapsed');
  if (isOpen) {
    body.classList.add('collapsed');
    header.classList.remove('open');
  } else {
    body.classList.remove('collapsed');
    header.classList.add('open');
  }
}

// ── Account ────────────────────────────────────────────
function saveAccount() {
  const bank      = document.getElementById('bankName').value.trim();
  const accountNo = document.getElementById('accountNumber').value.trim();
  if (!bank || !accountNo) { showToast('은행과 계좌번호를 모두 입력해주세요'); return; }
  account = { bank, accountNo };
  localStorage.setItem(LS_ACC, JSON.stringify(account));
  showToast('계좌 정보가 저장되었습니다 💾');
}

// ── Create Request ─────────────────────────────────────
function createRequest() {
  const amount = parseInt(document.getElementById('amount').value);
  const date   = document.getElementById('date').value;
  const memo   = document.getElementById('memo').value.trim();
  if (!amount || !date || !memo) { showToast('모든 항목을 입력해주세요'); return; }
  if (!account.bank || !account.accountNo) { showToast('먼저 계좌 정보를 설정해주세요'); return; }

  const req = {
    id: Date.now(),
    amount, date, memo,
    paid: false,
    paidAmount: 0,
    token: genToken()
  };

  requests.unshift(req);
  save();
  document.getElementById('amount').value = '';
  document.getElementById('date').value   = '';
  document.getElementById('memo').value   = '';
  showToast('요청이 생성되었습니다 ✨');
  renderRequests();
}

function genToken() {
  return Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2);
}

// ── Share ──────────────────────────────────────────────
function shareRequest(id) {
  const req = requests.find(r => r.id === id);
  if (!req) return;
  const url = location.origin + location.pathname + '?token=' + req.token;
  if (navigator.share) {
    navigator.share({ title: '송금 요청', text: req.memo + ' — ' + fmt(req.amount) + '원', url })
      .then(() => showToast('공유 성공 📤'))
      .catch(() => copyText(url));
  } else {
    copyText(url);
  }
}

function copyText(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToast('링크가 복사되었습니다 📋'));
  } else {
    // fallback
    const el = document.createElement('textarea');
    el.value = text; el.style.position = 'fixed'; el.style.opacity = '0';
    document.body.appendChild(el); el.select();
    document.execCommand('copy'); el.remove();
    showToast('링크가 복사되었습니다 📋');
  }
}

// ── Mark Paid ──────────────────────────────────────────
function markAsPaid(id) {
  const req = requests.find(r => r.id === id);
  if (!req) return;
  req.paid = true; req.paidAmount = req.amount;
  save(); renderRequests();
  showToast('받은 돈으로 표시했습니다 ✅');
}

// ── Delete ─────────────────────────────────────────────
function deleteRequest(id) {
  if (!confirm('이 요청을 삭제하시겠습니까?')) return;
  requests = requests.filter(r => r.id !== id);
  save(); renderRequests();
  showToast('요청이 삭제되었습니다');
}

// ── Save ───────────────────────────────────────────────
function save() { localStorage.setItem(LS_REQ, JSON.stringify(requests)); }

// ── Format ─────────────────────────────────────────────
function fmt(n) { return Number(n).toLocaleString('ko-KR'); }

// ── Switch Tab ─────────────────────────────────────────
let currentTab = 'unreceived';
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-unreceived').classList.toggle('active', tab === 'unreceived');
  document.getElementById('tab-received').classList.toggle('active', tab === 'received');
  document.getElementById('unreceivedList').classList.toggle('hidden', tab !== 'unreceived');
  document.getElementById('receivedList').classList.toggle('hidden', tab !== 'received');
}

// ── Render ─────────────────────────────────────────────
function renderRequests() {
  const unr = requests.filter(r => !r.paid);
  const rec = requests.filter(r =>  r.paid);

  document.getElementById('unreceivedCount').textContent = unr.length;
  document.getElementById('receivedCount').textContent   = rec.length;
  document.getElementById('totalReceived').textContent   = fmt(rec.reduce((s,r) => s + r.paidAmount, 0)) + '원';
  document.getElementById('totalUnreceived').textContent = fmt(unr.reduce((s,r) => s + r.amount, 0)) + '원';

  // Unreceived
  const uEl = document.getElementById('unreceivedList');
  uEl.innerHTML = unr.length === 0
    ? `<div class="empty"><div class="empty-icon">🎉</div>미수령 금액이 없어요!</div>`
    : unr.map(r => `
      <div class="card">
        <div class="card-date">${r.date}</div>
        <div class="card-memo">${r.memo}</div>
        <div class="card-amount pending">${fmt(r.amount)}원</div>
        <span class="card-status status-pending">⏰ 미수령</span>
        <div class="card-actions">
          <button class="btn btn-ghost btn-sm" onclick="shareRequest(${r.id})">📤 공유</button>
          <button class="btn btn-green btn-sm" onclick="markAsPaid(${r.id})">✅ 받았어요</button>
        </div>
        <button class="delete-btn" onclick="deleteRequest(${r.id})">삭제</button>
      </div>`).join('');

  // Received
  const rEl = document.getElementById('receivedList');
  rEl.innerHTML = rec.length === 0
    ? `<div class="empty"><div class="empty-icon">📭</div>아직 받은 내역이 없어요</div>`
    : rec.map(r => `
      <div class="card">
        <div class="card-date">${r.date}</div>
        <div class="card-memo">${r.memo}</div>
        <div class="card-amount paid">${fmt(r.amount)}원</div>
        <div class="card-paid-note">+${fmt(r.paidAmount)}원 수령 완료</div>
        <span class="card-status status-paid">✅ 수령완료</span>
        <button class="delete-btn" onclick="deleteRequest(${r.id})">삭제</button>
      </div>`).join('');
}

// ── Share Link Modal ───────────────────────────────────
function checkShareLink() {
  const token = new URLSearchParams(location.search).get('token');
  if (!token) return;
  const req = requests.find(r => r.token === token);
  if (req) showPaymentModal(req);
}

function showPaymentModal(req) {
  const acctHtml = account.bank && account.accountNo
    ? `<div class="acct-box">
         <div class="lbl">계좌 정보</div>
         <div class="val">${account.bank} ${account.accountNo}</div>
       </div>`
    : '';

  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.innerHTML = `
    <div class="modal">
      <div class="modal-title">
        <div class="amount">${fmt(req.amount)}원</div>
        <div class="memo">${req.memo}</div>
        <div class="date">${req.date}</div>
      </div>
      ${acctHtml}
      <div class="modal-actions">
        <button class="btn btn-blue" onclick="sendToToss(${req.amount})">💸 토스로 보내기</button>
        <button class="btn btn-ghost" onclick="copyAccount()">📋 계좌번호 복사</button>
        <div class="divider"></div>
        <button class="btn btn-ghost" onclick="this.closest('.modal-backdrop').remove()">닫기</button>
      </div>
    </div>`;
  backdrop.addEventListener('click', e => { if (e.target === backdrop) backdrop.remove(); });
  document.body.appendChild(backdrop);
}

function sendToToss(amount) {
  if (!account.bank || !account.accountNo) { showToast('계좌 정보가 없습니다'); return; }
  location.href = `supertoss://send?bank=${encodeURIComponent(account.bank)}&accountNo=${encodeURIComponent(account.accountNo)}&amount=${amount}`;
  showToast('토스 앱으로 이동합니다...');
}

function copyAccount() {
  if (!account.accountNo) { showToast('계좌번호가 없습니다'); return; }
  copyText(account.bank + ' ' + account.accountNo);
}

// ── Run ────────────────────────────────────────────────
init();
</script>
</body>
</html>
